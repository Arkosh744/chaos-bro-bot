<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trickster — Панель управления хаосом</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0d0d1a;
            --bg-card: rgba(22, 33, 62, 0.6);
            --bg-card-hover: rgba(22, 33, 62, 0.85);
            --accent: #0f3460;
            --highlight: #e94560;
            --highlight-glow: rgba(233, 69, 96, 0.4);
            --text: #e0e0e0;
            --text-dim: #8892a4;
            --text-bright: #ffffff;
            --success: #00d68f;
            --success-glow: rgba(0, 214, 143, 0.3);
            --border: rgba(255, 255, 255, 0.06);
            --glass: rgba(255, 255, 255, 0.03);
            --radius: 16px;
            --radius-sm: 10px;
            --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
            --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(15, 52, 96, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(233, 69, 96, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(0, 214, 143, 0.05) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes bgShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-2%, 1%) rotate(1deg); }
            66% { transform: translate(1%, -1%) rotate(-0.5deg); }
        }

        /* Header */
        .header {
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            background: rgba(13, 13, 26, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--highlight), #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .header .subtitle {
            font-size: 0.8rem;
            color: var(--text-dim);
            font-family: var(--mono);
        }

        /* User selector */
        .user-selector {
            position: relative;
        }

        .user-selector-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .user-selector-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .user-selector-btn .user-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--highlight);
            flex-shrink: 0;
        }

        .user-selector-btn .arrow {
            font-size: 0.6rem;
            transition: transform 0.2s;
        }

        .user-selector.open .arrow {
            transform: rotate(180deg);
        }

        .user-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            min-width: 280px;
            max-height: 320px;
            overflow-y: auto;
            background: rgba(13, 13, 26, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            z-index: 200;
            padding: 6px;
        }

        .user-selector.open .user-dropdown {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .user-dropdown-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            gap: 12px;
        }

        .user-dropdown-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-dropdown-item.active {
            background: rgba(233, 69, 96, 0.1);
            border: 1px solid rgba(233, 69, 96, 0.2);
        }

        .user-dropdown-item .user-dd-id {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--text-bright);
        }

        .user-dropdown-item .user-dd-meta {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-align: right;
        }

        .user-dropdown-item .user-dd-owner {
            font-size: 0.6rem;
            color: var(--highlight);
            font-family: var(--mono);
            font-weight: 600;
        }

        /* Navigation */
        .nav {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: var(--glass);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .nav-btn {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            font-family: var(--sans);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-btn.active {
            color: var(--text-bright);
            background: var(--accent);
            box-shadow: 0 0 20px rgba(15, 52, 96, 0.5);
        }

        /* Main content */
        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        /* Tabs */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            backdrop-filter: blur(12px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            text-align: center;
            padding: 28px 24px;
        }

        .stat-card .stat-value {
            font-family: var(--mono);
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 8px;
            color: var(--text-bright);
        }

        .stat-card .stat-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .stat-card.highlight-red .stat-value {
            color: var(--highlight);
            text-shadow: 0 0 30px var(--highlight-glow);
        }

        .stat-card.highlight-green .stat-value {
            color: var(--success);
            text-shadow: 0 0 30px var(--success-glow);
        }

        .stat-card.highlight-blue .stat-value {
            color: #4fc3f7;
            text-shadow: 0 0 30px rgba(79, 195, 247, 0.3);
        }

        /* Charts */
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .header {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
            .header-left {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .users-grid {
                grid-template-columns: 1fr !important;
            }
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        /* Heatmap */
        .heatmap {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 3px;
            margin-top: 8px;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 4px;
            position: relative;
            transition: all 0.2s ease;
            cursor: default;
            min-height: 28px;
        }

        .heatmap-cell:hover {
            transform: scale(1.3);
            z-index: 1;
        }

        .heatmap-cell .tooltip {
            display: none;
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a2e;
            color: var(--text);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-family: var(--mono);
            white-space: nowrap;
            border: 1px solid var(--border);
            z-index: 10;
        }

        .heatmap-cell:hover .tooltip {
            display: block;
        }

        .heatmap-labels {
            display: grid;
            grid-template-columns: repeat(24, 1fr);
            gap: 3px;
            margin-top: 4px;
        }

        .heatmap-labels span {
            font-size: 0.6rem;
            font-family: var(--mono);
            color: var(--text-dim);
            text-align: center;
        }

        /* Last activity */
        .last-activity {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
            padding: 16px;
        }

        .last-activity strong {
            color: var(--text);
        }

        /* Profile / Facts */
        .facts-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .fact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }

        .fact-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .fact-category {
            font-family: var(--mono);
            font-size: 0.8rem;
            color: var(--highlight);
            min-width: 140px;
            font-weight: 600;
        }

        .fact-value {
            flex: 1;
            font-size: 0.9rem;
            color: var(--text);
        }

        .fact-actions {
            display: flex;
            gap: 6px;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            color: var(--highlight);
            border-color: var(--highlight);
            background: rgba(233, 69, 96, 0.1);
        }

        .btn-icon.save:hover {
            color: var(--success);
            border-color: var(--success);
            background: rgba(0, 214, 143, 0.1);
        }

        .add-fact-form {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .add-fact-form input {
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .add-fact-form input:focus {
            border-color: var(--accent);
        }

        .add-fact-form input::placeholder {
            color: var(--text-dim);
        }

        .add-fact-form input:first-child {
            width: 160px;
            font-family: var(--mono);
        }

        .add-fact-form input:nth-child(2) {
            flex: 1;
        }

        .btn {
            padding: 10px 20px;
            background: var(--accent);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--radius-sm);
            color: var(--text-bright);
            font-family: var(--sans);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #1a4a80;
            box-shadow: 0 0 20px rgba(15, 52, 96, 0.5);
        }

        .btn-danger {
            background: rgba(233, 69, 96, 0.2);
            border-color: rgba(233, 69, 96, 0.3);
        }

        .btn-danger:hover {
            background: rgba(233, 69, 96, 0.4);
        }

        .btn-success {
            background: rgba(0, 214, 143, 0.2);
            border-color: rgba(0, 214, 143, 0.3);
        }

        .btn-success:hover {
            background: rgba(0, 214, 143, 0.4);
        }

        /* Achievements */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .achievement {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            transition: all 0.3s ease;
        }

        .achievement.unlocked {
            border-color: rgba(233, 69, 96, 0.3);
            background: rgba(233, 69, 96, 0.05);
        }

        .achievement.unlocked:hover {
            box-shadow: 0 0 20px var(--highlight-glow);
        }

        .achievement.locked {
            opacity: 0.4;
            filter: grayscale(0.8);
        }

        .achievement-emoji {
            font-size: 2rem;
            width: 48px;
            text-align: center;
            flex-shrink: 0;
        }

        .achievement-info h3 {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-bright);
            margin-bottom: 2px;
        }

        .achievement-info p {
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .achievement-badge {
            margin-left: auto;
            font-size: 0.65rem;
            font-family: var(--mono);
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .achievement.unlocked .achievement-badge {
            background: rgba(0, 214, 143, 0.15);
            color: var(--success);
        }

        .achievement.locked .achievement-badge {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
        }

        .achievement-counter {
            text-align: center;
            padding: 16px;
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--text-dim);
            margin-bottom: 16px;
        }

        .achievement-counter strong {
            color: var(--highlight);
            font-size: 1.4rem;
        }

        /* Messages */
        .messages-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 70vh;
            overflow-y: auto;
            padding-right: 8px;
        }

        .messages-list::-webkit-scrollbar {
            width: 4px;
        }

        .messages-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .message {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border-left: 3px solid transparent;
            transition: background 0.2s ease;
        }

        .message:hover {
            background: var(--glass);
        }

        .message.role-user {
            border-left-color: #4fc3f7;
        }

        .message.role-bot {
            border-left-color: var(--highlight);
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .message-role {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .message.role-user .message-role {
            color: #4fc3f7;
        }

        .message.role-bot .message-role {
            color: var(--highlight);
        }

        .message-time {
            font-family: var(--mono);
            font-size: 0.65rem;
            color: var(--text-dim);
        }

        .message-text {
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--text);
            word-break: break-word;
        }

        /* Settings */
        .settings-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            gap: 16px;
        }

        .setting-label {
            font-size: 0.9rem;
            font-weight: 500;
        }

        .setting-desc {
            font-size: 0.78rem;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .setting-value {
            font-family: var(--mono);
            font-size: 0.85rem;
            color: var(--highlight);
            padding: 6px 12px;
            background: rgba(233, 69, 96, 0.1);
            border-radius: 6px;
        }

        .setting-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .setting-input {
            width: 60px;
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.85rem;
            outline: none;
            text-align: center;
            transition: border-color 0.2s ease;
        }

        .setting-input:focus {
            border-color: var(--accent);
        }

        /* Toggle switch */
        .toggle {
            position: relative;
            width: 48px;
            height: 26px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 13px;
            transition: all 0.3s ease;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background: var(--text-dim);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .toggle input:checked + .toggle-slider {
            background: rgba(233, 69, 96, 0.4);
        }

        .toggle input:checked + .toggle-slider::before {
            transform: translateX(22px);
            background: var(--highlight);
            box-shadow: 0 0 10px var(--highlight-glow);
        }

        /* Status indicator */
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.on {
            background: var(--success);
            box-shadow: 0 0 8px var(--success-glow);
        }

        .status-dot.off {
            background: var(--text-dim);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Counter animation */
        @keyframes countUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .count-animated {
            animation: countUp 0.6s ease forwards;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-dim);
            font-family: var(--mono);
            font-size: 0.85rem;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--highlight);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 48px 24px;
            color: var(--text-dim);
        }

        .empty-icon {
            font-size: 3rem;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty p {
            font-size: 0.85rem;
        }

        /* Edit mode for facts */
        .fact-edit-input {
            flex: 1;
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--accent);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--sans);
            font-size: 0.9rem;
            outline: none;
        }

        /* Users grid */
        .users-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .user-card {
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .user-card:hover {
            transform: translateY(-2px);
        }

        .user-card.is-owner {
            border-color: rgba(233, 69, 96, 0.2);
        }

        .user-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .user-card-id {
            font-family: var(--mono);
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-bright);
        }

        .user-card-badge {
            font-size: 0.6rem;
            font-family: var(--mono);
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(233, 69, 96, 0.15);
            color: var(--highlight);
        }

        .user-card-stats {
            display: flex;
            gap: 20px;
        }

        .user-card-stat {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .user-card-stat-value {
            font-family: var(--mono);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-bright);
        }

        .user-card-stat-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .user-card-last {
            margin-top: 12px;
            font-size: 0.75rem;
            font-family: var(--mono);
            color: var(--text-dim);
        }

        .user-card-actions {
            display: flex;
            gap: 8px;
            margin-top: 14px;
        }

        .user-card-actions .btn {
            padding: 6px 14px;
            font-size: 0.75rem;
        }

        /* Save confirmation toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            padding: 14px 24px;
            background: rgba(0, 214, 143, 0.15);
            border: 1px solid rgba(0, 214, 143, 0.3);
            border-radius: var(--radius-sm);
            color: var(--success);
            font-family: var(--mono);
            font-size: 0.85rem;
            z-index: 1000;
            backdrop-filter: blur(12px);
            animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
            pointer-events: none;
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes toastOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(20px); }
        }

        /* Current user badge in header */
        .current-user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 0.75rem;
            color: var(--text-dim);
            padding: 4px 0;
        }

        .current-user-info strong {
            color: var(--highlight);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-left">
            <div>
                <h1>Trickster Control Panel</h1>
                <div class="subtitle">// панель управления хаосом v2.0</div>
                <div class="current-user-info" id="current-user-info"></div>
            </div>
            <div class="user-selector" id="user-selector">
                <button class="user-selector-btn" id="user-selector-btn" onclick="toggleUserDropdown()">
                    <span class="user-indicator"></span>
                    <span id="user-selector-label">Загрузка...</span>
                    <span class="arrow">&#9660;</span>
                </button>
                <div class="user-dropdown" id="user-dropdown"></div>
            </div>
        </div>
        <nav class="nav">
            <button class="nav-btn active" data-tab="dashboard">Dashboard</button>
            <button class="nav-btn" data-tab="users">Users</button>
            <button class="nav-btn" data-tab="profile">Profile</button>
            <button class="nav-btn" data-tab="achievements">Achievements</button>
            <button class="nav-btn" data-tab="messages">Messages</button>
            <button class="nav-btn" data-tab="settings">Settings</button>
        </nav>
    </div>

    <div class="main">
        <!-- Dashboard -->
        <div id="tab-dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="card stat-card highlight-red">
                    <div class="stat-value" id="stat-today">-</div>
                    <div class="stat-label">Сообщений сегодня</div>
                </div>
                <div class="card stat-card highlight-blue">
                    <div class="stat-value" id="stat-week">-</div>
                    <div class="stat-label">За неделю</div>
                </div>
                <div class="card stat-card highlight-green">
                    <div class="stat-value" id="stat-total">-</div>
                    <div class="stat-label">Всего сообщений</div>
                </div>
            </div>

            <div class="charts-grid">
                <div class="card">
                    <div class="card-title">Настроение за последние 30 дней</div>
                    <div class="chart-container">
                        <canvas id="mood-chart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <div class="card-title">Активность по часам</div>
                    <div id="heatmap-container"></div>
                </div>
            </div>

            <div class="card last-activity">
                <span id="last-activity-text">Загрузка...</span>
            </div>
        </div>

        <!-- Users -->
        <div id="tab-users" class="tab-content">
            <div class="card" style="margin-bottom: 24px;">
                <div class="card-title">Все пользователи</div>
                <div id="users-container" class="users-grid">
                    <div class="loading">Загрузка</div>
                </div>
            </div>
        </div>

        <!-- Profile -->
        <div id="tab-profile" class="tab-content">
            <div class="card">
                <div class="card-title">Досье пользователя</div>
                <div id="facts-container" class="facts-list">
                    <div class="loading">Загрузка</div>
                </div>
                <div class="add-fact-form">
                    <input type="text" id="new-fact-category" placeholder="Категория">
                    <input type="text" id="new-fact-value" placeholder="Значение">
                    <button class="btn" onclick="addFact()">Добавить</button>
                </div>
            </div>
        </div>

        <!-- Achievements -->
        <div id="tab-achievements" class="tab-content">
            <div class="achievement-counter" id="achievement-counter"></div>
            <div id="achievements-container" class="achievements-grid">
                <div class="loading">Загрузка</div>
            </div>
        </div>

        <!-- Messages -->
        <div id="tab-messages" class="tab-content">
            <div class="card">
                <div class="card-title">Последние сообщения</div>
                <div id="messages-container" class="messages-list">
                    <div class="loading">Загрузка</div>
                </div>
            </div>
        </div>

        <!-- Settings -->
        <div id="tab-settings" class="tab-content">
            <div class="card">
                <div class="card-title">Конфигурация бота</div>
                <div id="settings-container" class="settings-group">
                    <div class="loading">Загрузка</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Current selected user ID (0 means use server default / ownerID)
        let currentUserID = 0;
        let allUsers = [];

        // Build query string with user_id if set
        function userQuery(extra) {
            const params = new URLSearchParams();
            if (currentUserID) params.set('user_id', currentUserID);
            if (extra) {
                for (const [k, v] of Object.entries(extra)) {
                    params.set(k, v);
                }
            }
            const qs = params.toString();
            return qs ? '?' + qs : '';
        }

        // Tab navigation
        const navBtns = document.querySelectorAll('.nav-btn');
        const tabs = document.querySelectorAll('.tab-content');

        navBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                navBtns.forEach(b => b.classList.remove('active'));
                tabs.forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('tab-' + tab).classList.add('active');
                loadTabData(tab);
            });
        });

        // User selector dropdown
        function toggleUserDropdown() {
            document.getElementById('user-selector').classList.toggle('open');
        }

        // Close dropdown on outside click
        document.addEventListener('click', function(e) {
            const sel = document.getElementById('user-selector');
            if (!sel.contains(e.target)) {
                sel.classList.remove('open');
            }
        });

        function selectUser(userID) {
            currentUserID = userID;
            document.getElementById('user-selector').classList.remove('open');
            updateUserSelectorLabel();
            updateCurrentUserInfo();
            // Reload current tab
            const activeBtn = document.querySelector('.nav-btn.active');
            if (activeBtn) loadTabData(activeBtn.dataset.tab);
        }

        function updateUserSelectorLabel() {
            const label = document.getElementById('user-selector-label');
            if (!currentUserID) {
                label.textContent = 'Owner (default)';
            } else {
                label.textContent = 'ID: ' + currentUserID;
            }
            renderUserDropdown();
        }

        function updateCurrentUserInfo() {
            const el = document.getElementById('current-user-info');
            const user = allUsers.find(u => u.user_id === currentUserID);
            if (user) {
                el.innerHTML = '<strong>' + escapeHtml(user.display_name) + '</strong> | ' + user.message_count + ' сообщ.';
            } else if (!currentUserID && allUsers.length > 0) {
                const owner = allUsers.find(u => u.is_owner);
                if (owner) {
                    el.innerHTML = '<strong>' + escapeHtml(owner.display_name) + '</strong> | ' + owner.message_count + ' сообщ.';
                } else {
                    el.innerHTML = '';
                }
            } else {
                el.innerHTML = '';
            }
        }

        function renderUserDropdown() {
            const dd = document.getElementById('user-dropdown');
            if (allUsers.length === 0) {
                dd.innerHTML = '<div style="padding:12px;color:var(--text-dim);font-size:0.8rem;">Нет пользователей</div>';
                return;
            }
            dd.innerHTML = allUsers.map(u => {
                const isActive = u.user_id === currentUserID || (!currentUserID && u.is_owner);
                return '<div class="user-dropdown-item ' + (isActive ? 'active' : '') + '" onclick="selectUser(' + u.user_id + ')">' +
                    '<div>' +
                        '<div class="user-dd-id">' + escapeHtml(u.display_name) + '</div>' +
                        (u.username ? '<div style="font-size:0.7rem;color:var(--text-dim);">@' + escapeHtml(u.username) + '</div>' : '') +
                        (u.is_owner ? '<div class="user-dd-owner">owner</div>' : '') +
                    '</div>' +
                    '<div class="user-dd-meta">' + u.message_count + ' сообщ.<br>' + (u.last_message || '-') + '</div>' +
                '</div>';
            }).join('');
        }

        // Load users list
        async function loadUsersList() {
            try {
                const res = await fetch('/api/users');
                allUsers = await res.json();
                updateUserSelectorLabel();
                updateCurrentUserInfo();
            } catch (err) {
                console.error('Users list load error:', err);
            }
        }

        // Animated counter
        function animateCounter(el, target) {
            const duration = 1000;
            const start = performance.now();
            const startVal = 0;

            el.classList.add('count-animated');

            function update(now) {
                const elapsed = now - start;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                const current = Math.round(startVal + (target - startVal) * eased);
                el.textContent = current.toLocaleString('ru-RU');
                if (progress < 1) requestAnimationFrame(update);
            }

            requestAnimationFrame(update);
        }

        // Chart instances
        let moodChart = null;

        // Load dashboard data
        async function loadDashboard() {
            try {
                const [statsRes, moodRes] = await Promise.all([
                    fetch('/api/stats' + userQuery()),
                    fetch('/api/mood' + userQuery({days: 30}))
                ]);
                const stats = await statsRes.json();
                const mood = await moodRes.json();

                animateCounter(document.getElementById('stat-today'), stats.today || 0);
                animateCounter(document.getElementById('stat-week'), stats.week || 0);
                animateCounter(document.getElementById('stat-total'), stats.total || 0);

                // Last activity
                const actEl = document.getElementById('last-activity-text');
                if (stats.last_activity) {
                    actEl.innerHTML = 'Последняя активность: <strong>' + stats.last_activity + '</strong>';
                } else {
                    actEl.textContent = 'Нет данных об активности';
                }

                // Mood chart
                renderMoodChart(mood);

                // Heatmap
                renderHeatmap(stats.heatmap || new Array(24).fill(0));
            } catch (err) {
                console.error('Dashboard load error:', err);
            }
        }

        function renderMoodChart(data) {
            const ctx = document.getElementById('mood-chart').getContext('2d');

            if (moodChart) {
                moodChart.destroy();
            }

            const labels = data.map(d => d.date);
            const scores = data.map(d => d.score);

            moodChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Настроение',
                        data: scores,
                        borderColor: '#e94560',
                        backgroundColor: 'rgba(233, 69, 96, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#e94560',
                        pointBorderColor: '#e94560',
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        tension: 0.3,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1a1a2e',
                            borderColor: 'rgba(255,255,255,0.1)',
                            borderWidth: 1,
                            titleFont: { family: 'monospace' },
                            bodyFont: { family: 'monospace' },
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 10,
                            grid: { color: 'rgba(255,255,255,0.04)' },
                            ticks: { color: '#8892a4', font: { family: 'monospace', size: 11 } }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                color: '#8892a4',
                                font: { family: 'monospace', size: 10 },
                                maxRotation: 45,
                                maxTicksLimit: 10
                            }
                        }
                    }
                }
            });
        }

        function renderHeatmap(data) {
            const container = document.getElementById('heatmap-container');
            const maxVal = Math.max(...data, 1);

            let cellsHtml = '<div class="heatmap">';
            for (let h = 0; h < 24; h++) {
                const val = data[h];
                const intensity = val / maxVal;
                let bg;
                if (val === 0) {
                    bg = 'rgba(255,255,255,0.03)';
                } else if (intensity < 0.25) {
                    bg = 'rgba(15, 52, 96, 0.5)';
                } else if (intensity < 0.5) {
                    bg = 'rgba(15, 52, 96, 0.8)';
                } else if (intensity < 0.75) {
                    bg = 'rgba(233, 69, 96, 0.5)';
                } else {
                    bg = 'rgba(233, 69, 96, 0.8)';
                }
                cellsHtml += '<div class="heatmap-cell" style="background:' + bg + '">';
                cellsHtml += '<span class="tooltip">' + h + ':00 — ' + val + ' сообщ.</span>';
                cellsHtml += '</div>';
            }
            cellsHtml += '</div>';

            cellsHtml += '<div class="heatmap-labels">';
            for (let h = 0; h < 24; h++) {
                cellsHtml += '<span>' + String(h).padStart(2, '0') + '</span>';
            }
            cellsHtml += '</div>';

            container.innerHTML = cellsHtml;
        }

        // Users tab
        async function loadUsers() {
            try {
                const res = await fetch('/api/users');
                const users = await res.json();
                allUsers = users;
                updateUserSelectorLabel();
                updateCurrentUserInfo();
                const container = document.getElementById('users-container');

                if (!users || users.length === 0) {
                    container.innerHTML = '<div class="empty"><div class="empty-icon">&#128100;</div><p>Нет пользователей</p></div>';
                    return;
                }

                container.innerHTML = users.map(u =>
                    '<div class="card user-card ' + (u.is_owner ? 'is-owner' : '') + '">' +
                        '<div class="user-card-header">' +
                            '<span class="user-card-id">' + escapeHtml(u.display_name) + '</span>' +
                            (u.username ? '<span style="font-size:0.75rem;color:var(--text-dim);margin-left:8px;">@' + escapeHtml(u.username) + '</span>' : '') +
                            (u.is_owner ? '<span class="user-card-badge">owner</span>' : '') +
                        '</div>' +
                        '<div class="user-card-stats">' +
                            '<div class="user-card-stat">' +
                                '<span class="user-card-stat-value">' + u.message_count.toLocaleString('ru-RU') + '</span>' +
                                '<span class="user-card-stat-label">Сообщений</span>' +
                            '</div>' +
                        '</div>' +
                        '<div class="user-card-last">Последнее: ' + (u.last_message || '-') + '</div>' +
                        '<div class="user-card-actions">' +
                            '<button class="btn" onclick="switchToUserTab(' + u.user_id + ', \'profile\')">Профиль</button>' +
                            '<button class="btn" onclick="switchToUserTab(' + u.user_id + ', \'messages\')">Сообщения</button>' +
                            '<button class="btn" onclick="switchToUserTab(' + u.user_id + ', \'dashboard\')">Статистика</button>' +
                        '</div>' +
                    '</div>'
                ).join('');
            } catch (err) {
                console.error('Users load error:', err);
            }
        }

        function switchToUserTab(userID, tab) {
            selectUser(userID);
            // Switch tab
            navBtns.forEach(b => b.classList.remove('active'));
            tabs.forEach(t => t.classList.remove('active'));
            const btn = document.querySelector('.nav-btn[data-tab="' + tab + '"]');
            if (btn) btn.classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            loadTabData(tab);
        }

        // Profile
        async function loadProfile() {
            try {
                const res = await fetch('/api/profile' + userQuery());
                const facts = await res.json();
                const container = document.getElementById('facts-container');

                if (!facts || facts.length === 0) {
                    container.innerHTML = '<div class="empty"><div class="empty-icon">?</div><p>Досье пустое. Бот ещё не собрал информацию.</p></div>';
                    return;
                }

                container.innerHTML = facts.map(f =>
                    '<div class="fact-item" data-category="' + escapeHtml(f.category) + '">' +
                        '<span class="fact-category">' + escapeHtml(f.category) + '</span>' +
                        '<span class="fact-value">' + escapeHtml(f.fact) + '</span>' +
                        '<div class="fact-actions">' +
                            '<button class="btn-icon" onclick="editFact(this)" title="Редактировать">&#9998;</button>' +
                            '<button class="btn-icon" onclick="deleteFact(\'' + escapeHtml(f.category) + '\')" title="Удалить">&#10005;</button>' +
                        '</div>' +
                    '</div>'
                ).join('');
            } catch (err) {
                console.error('Profile load error:', err);
            }
        }

        function editFact(btn) {
            const item = btn.closest('.fact-item');
            const category = item.dataset.category;
            const valueEl = item.querySelector('.fact-value');
            const currentValue = valueEl.textContent;

            valueEl.innerHTML = '<input class="fact-edit-input" type="text" value="' + escapeHtml(currentValue) + '">';
            const input = valueEl.querySelector('input');
            input.focus();

            const actions = item.querySelector('.fact-actions');
            actions.innerHTML = '<button class="btn-icon save" onclick="saveFact(\'' + escapeHtml(category) + '\', this)" title="Сохранить">&#10003;</button>';

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') saveFact(category, actions.querySelector('.btn-icon'));
                if (e.key === 'Escape') loadProfile();
            });
        }

        async function saveFact(category, btn) {
            const item = btn.closest('.fact-item');
            const input = item.querySelector('.fact-edit-input');
            const value = input.value.trim();
            if (!value) return;

            try {
                await fetch('/api/profile' + userQuery(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: category, fact: value })
                });
                loadProfile();
            } catch (err) {
                console.error('Save fact error:', err);
            }
        }

        async function deleteFact(category) {
            try {
                await fetch('/api/profile' + userQuery(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: category, fact: '' })
                });
                loadProfile();
            } catch (err) {
                console.error('Delete fact error:', err);
            }
        }

        async function addFact() {
            const catEl = document.getElementById('new-fact-category');
            const valEl = document.getElementById('new-fact-value');
            const category = catEl.value.trim();
            const fact = valEl.value.trim();
            if (!category || !fact) return;

            try {
                await fetch('/api/profile' + userQuery(), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ category: category, fact: fact })
                });
                catEl.value = '';
                valEl.value = '';
                loadProfile();
            } catch (err) {
                console.error('Add fact error:', err);
            }
        }

        // Achievements
        async function loadAchievements() {
            try {
                const res = await fetch('/api/achievements' + userQuery());
                const achievements = await res.json();
                const container = document.getElementById('achievements-container');
                const counter = document.getElementById('achievement-counter');

                const unlocked = achievements.filter(a => a.unlocked);
                counter.innerHTML = 'Открыто <strong>' + unlocked.length + '</strong> из <strong>' + achievements.length + '</strong>';

                // Sort: unlocked first
                achievements.sort((a, b) => {
                    if (a.unlocked === b.unlocked) return a.name.localeCompare(b.name);
                    return a.unlocked ? -1 : 1;
                });

                container.innerHTML = achievements.map(a =>
                    '<div class="achievement ' + (a.unlocked ? 'unlocked' : 'locked') + '">' +
                        '<div class="achievement-emoji">' + a.emoji + '</div>' +
                        '<div class="achievement-info">' +
                            '<h3>' + escapeHtml(a.name) + '</h3>' +
                            '<p>' + escapeHtml(a.desc) + '</p>' +
                        '</div>' +
                        '<span class="achievement-badge">' + (a.unlocked ? 'open' : 'locked') + '</span>' +
                    '</div>'
                ).join('');
            } catch (err) {
                console.error('Achievements load error:', err);
            }
        }

        // Messages
        async function loadMessages() {
            try {
                const res = await fetch('/api/messages' + userQuery({limit: 50}));
                const messages = await res.json();
                const container = document.getElementById('messages-container');

                if (!messages || messages.length === 0) {
                    container.innerHTML = '<div class="empty"><div class="empty-icon">&#128172;</div><p>Нет сообщений</p></div>';
                    return;
                }

                container.innerHTML = messages.map(m =>
                    '<div class="message role-' + m.role + '">' +
                        '<div class="message-header">' +
                            '<span class="message-role">' + (m.role === 'user' ? 'user' : 'bot') + '</span>' +
                            '<span class="message-time">' + m.created_at + '</span>' +
                        '</div>' +
                        '<div class="message-text">' + escapeHtml(m.text) + '</div>' +
                    '</div>'
                ).join('');

                // Scroll to bottom
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error('Messages load error:', err);
            }
        }

        // Settings
        async function loadSettings() {
            try {
                const res = await fetch('/api/config');
                const config = await res.json();
                const container = document.getElementById('settings-container');

                container.innerHTML =
                    '<div class="setting-row">' +
                        '<div>' +
                            '<div class="setting-label"><span class="status-dot ' + (config.scheduler_enabled ? 'on' : 'off') + '" id="sched-status-dot"></span>Планировщик</div>' +
                            '<div class="setting-desc">Автоматические пинги и напоминания</div>' +
                        '</div>' +
                        '<label class="toggle">' +
                            '<input type="checkbox" id="scheduler-toggle" ' + (config.scheduler_enabled ? 'checked' : '') + ' onchange="toggleScheduler(this.checked)">' +
                            '<span class="toggle-slider"></span>' +
                        '</label>' +
                    '</div>' +
                    '<div class="setting-row">' +
                        '<div>' +
                            '<div class="setting-label">Часы пингов</div>' +
                            '<div class="setting-desc">Временной диапазон для автоматических сообщений</div>' +
                        '</div>' +
                        '<div class="setting-controls">' +
                            '<input type="number" class="setting-input" id="hours-min" value="' + config.scheduler_min_hour + '" min="0" max="23">' +
                            '<span style="color:var(--text-dim);">—</span>' +
                            '<input type="number" class="setting-input" id="hours-max" value="' + config.scheduler_max_hour + '" min="0" max="23">' +
                            '<button class="btn btn-success" onclick="saveHours()">Сохранить</button>' +
                        '</div>' +
                    '</div>' +
                    '<div class="setting-row">' +
                        '<div>' +
                            '<div class="setting-label">Web-порт</div>' +
                            '<div class="setting-desc">Порт веб-дашборда (изменение требует перезапуска)</div>' +
                        '</div>' +
                        '<div class="setting-value">:' + config.web_port + '</div>' +
                    '</div>';
            } catch (err) {
                console.error('Settings load error:', err);
            }
        }

        async function toggleScheduler(enabled) {
            try {
                const res = await fetch('/api/config/scheduler', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: enabled })
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    const dot = document.getElementById('sched-status-dot');
                    if (dot) {
                        dot.className = 'status-dot ' + (enabled ? 'on' : 'off');
                    }
                    showToast('Планировщик ' + (enabled ? 'включен' : 'выключен'));
                }
            } catch (err) {
                console.error('Toggle scheduler error:', err);
            }
        }

        async function saveHours() {
            const min = parseInt(document.getElementById('hours-min').value);
            const max = parseInt(document.getElementById('hours-max').value);

            if (isNaN(min) || isNaN(max) || min < 0 || min > 23 || max < 0 || max > 23) {
                showToast('Часы должны быть от 0 до 23');
                return;
            }
            if (min >= max) {
                showToast('Минимум должен быть меньше максимума');
                return;
            }

            try {
                const res = await fetch('/api/config/hours', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ min_hour: min, max_hour: max })
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    showToast('Часы сохранены: ' + min + ':00 — ' + max + ':00');
                } else if (data.error) {
                    showToast(data.error);
                }
            } catch (err) {
                console.error('Save hours error:', err);
            }
        }

        function showToast(message) {
            // Remove existing toast
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => { if (toast.parentNode) toast.remove(); }, 2500);
        }

        // Tab data loader
        function loadTabData(tab) {
            switch (tab) {
                case 'dashboard': loadDashboard(); break;
                case 'users': loadUsers(); break;
                case 'profile': loadProfile(); break;
                case 'achievements': loadAchievements(); break;
                case 'messages': loadMessages(); break;
                case 'settings': loadSettings(); break;
            }
        }

        // Utility
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initial load
        loadUsersList().then(() => loadDashboard());
    </script>
</body>
</html>
